<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAY ROW</title>
    <link rel="icon" type="image/png" href="img/icon.jpg" />
    <link rel="stylesheet" href="css/checkout.css">
    <link rel="stylesheet" href="css/fonts.css">
</head>

<body class="checkout-page">
  <header>
    <nav class="navbar">
      <ul>
        <li><a href="index.html">HOME</a></li>
        <li><a href="index.html#about">ABOUT</a></li>
        <li><a href="menu.html">MENU</a></li>
        <li><a href="checkout.html">CART</a></li>
        <li><a href="rewards.html">REWARDS</a></li>
        <li><a href="#footer">CONTACT</a></li>
      </ul>
    </nav>
  </header>

  <main class="checkout-cart">
    <section class="checkout-wrap">
      <div class="checkout-page-container"> 

      <div class="checkout-intro">
        <h1>Checkout</h1>
        <p>Purchase and enjoy your coffee!</p>
      </div>

      <section class="checkout-layout">

        <!-- Order summary -->
        <div class="checkout-container">
          <h2>Your Order</h2>
          <hr>
          <p>Espresso - $1</p>
          <p>Mocha - $1</p>
          <p><strong>Order Total: $2</strong></p>
        </div>
        

        <!-- Payment form -->
        <div class="payment-container">
          <div class="payment-box">
            <h2>Payment</h2>
            <hr>
            <form class="payment-form">
              <label for="cname">Name on Card</label>
              <input type="text" id="cname" placeholder="Name">

              <label for="ccnum">Credit Card Number</label>
              <input type="text" id="ccnum" placeholder="1111-2222-3333-4444">

              <label for="exp">Exp Month/Year</label>
              <input type="text" id="exp" placeholder="MM/YY">

              <label for="cvv">CVV</label>
              <input type="text" id="cvv" placeholder="XXX">

              <button class="btn" type="submit">Purchase</button>
            </form>

          </div>
        </div>

      </section>
      </div>
    </section>
  </main>

  <footer id="footer">
      <div class="footer-container">
        <hr/>
        <section id="logo">
          <div id="logo-container">
            <img src="img/logo.png" class="drc-logo">
          </div>
        </section>
        <p>
          <strong>Address:</strong> 14-3 Itaewon-ro 49-gil, Seoul, South Korea
        </p>
        <p><strong>Phone:</strong> (604) 555-1234</p>
        <p><strong>Hours:</strong> 11am to 9pm</p>
        <a href="style.html">
          <p>Style Guide</p>
        </a>
      </div>
    </footer>

</body>
</html>
